<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Post a Request | HelpHub AI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar-wrapper container">
        <div class="navbar-container">
            <div class="nav-logo"><div class="logo-box">H</div> HelpHub AI</div>
            <div class="nav-menu">
                <a href="index.html" class="nav-link">Home</a>
                <a href="explore.html" class="nav-link">Explore</a>
                <a href="leaderboard.html" class="nav-link">Leaderboard</a>
            </div>
            <button class="btn-platform">My Profile</button>
        </div>
    </nav>

    <main class="container" style="max-width: 800px; margin-top: 50px;">
        <div class="card-premium">
            <p class="tag-mini">GET HELP</p>
            <h1 style="font-size: 32px; margin: 10px 0 30px 0;">What do you need help with?</h1>
            
            <form id="requestForm">
                <div class="filter-group">
                    <label>Title</label>
                    <input type="text" name="title" id="reqTitle" placeholder="e.g., Help with React Router error" class="custom-input" required>
                </div>

                <div class="filter-group">
                    <label>Description</label>
                    <textarea name="description" id="reqDesc" placeholder="Describe your problem in detail..." class="custom-input" style="height: 150px; resize: none;" required></textarea>
                </div>

                <div class="grid-2" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;">
                    <div class="filter-group">
                        <label>Urgency</label>
                        <select name="urgency" id="reqUrgency" class="custom-select">
                            <option value="Low">Low</option>
                            <option value="Medium" selected>Medium</option>
                            <option value="High">High</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Location</label>
                        <input type="text" name="location" id="reqLoc" placeholder="e.g., Remote or Karachi" class="custom-input">
                    </div>
                </div>

                <div class="filter-group" style="margin-top: 20px;">
                    <label>Tags (Comma separated)</label>
                    <input type="text" name="tags" id="reqTags" placeholder="react, nodejs, bug" class="custom-input">
                </div>

                <button type="submit" class="btn-platform" style="width: 100%; margin-top: 30px; padding: 18px;">Post Request</button>
            </form>
            <div id="responseMsg" style="margin-top: 20px; text-align: center; font-weight: 600;"></div>
        </div>
    </main>

    <script src="post.js"></script>
</body>
</html>
